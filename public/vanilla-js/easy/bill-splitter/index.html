<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Bill Splitter - HTML/CSS/JS</title>
</head>
<body>
  <main class="container">
    <!-- Bill Input  -->
    <div class="billInput">
      <div class="header">
        <h1>Split the Bill <img src="/JavaScript_logo.png" alt="JS Icon" height="24" width="24" title="Made in Vanilla HTML/CSS/JS"></h1>
        <p>Split the bill with ease!</p>
      </div>

      <div class="inputBill">
        <label>Bill: </label>
        <input type="number" id="billInput" placeholder="Enter the bill amount" />
      </div>

      <div class="inputTip">
        <p>Select Tip: </p>
        <div class="tipBtnContainer">
          <div class="tipBtnGroup">
            <button class="tipBtn" disabled>5%</button>
            <button class="tipBtn" disabled>10%</button>
            <button class="tipBtn" disabled>15%</button>
            <button class="tipBtn" disabled>25%</button>
            <button class="tipBtn" disabled>50%</button>
          </div>
          <input type="number" id="customTip" placeholder="Enter custom tip" />
        </div>
      </div>

      <div class="inputPeople">
        <label>Number of People: </label>
        <input type="number" id="peopleInput" placeholder="Enter the number of people" />
      </div>

      <div class="calculateBtnContainer">
        <button class="calculateBtn" disabled>Calculate</button>
      </div>
    </div>

    <!-- Bill Display -->
    <div class="billDisplay">
      <div class="header">
        <h1>Total Bill Split</h1>
        <p>This is how much each person should pay</p>
      </div>

      <div class="tipAmount">
        <p>Tip Amount: <span id="tipAmount">0.00</span></p>
      </div>

      <div class="totalAmount">
        <p>Total: <span id="totalAmount">0.00</span></p>
      </div>

      <div class="billPerPerson">
        <p>Bill Per Person: <span id="billPerPerson">0.00</span></p>
      </div>

      <div class="resetBtnContainer">
        <button class="resetBtn">Reset</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
